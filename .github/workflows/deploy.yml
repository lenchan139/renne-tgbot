name: Build & Deploy to Production Branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Prepare production artifact
        run: |
          mkdir -p _deploy
          cp -r dist/ _deploy/dist/
          cp -r node_modules/ _deploy/node_modules/
          cp package.json package-lock.json _deploy/
          mkdir -p _deploy/scripts
          cp scripts/prod-start.sh scripts/update-checker.cjs _deploy/scripts/
          chmod +x _deploy/scripts/prod-start.sh
          mkdir -p _deploy/ecosystem
          cp ecosystem/ecosystem.config.cjs _deploy/ecosystem/

      - name: Deploy to _pm2_prod_run
        run: |
          # Save artifacts outside repo
          cp -r _deploy /tmp/renne-deploy
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch production branch if it exists
          git fetch origin _pm2_prod_run 2>/dev/null || true

          # Switch to production branch
          if git show-ref --verify --quiet refs/remotes/origin/_pm2_prod_run; then
            git checkout -B _pm2_prod_run origin/_pm2_prod_run
          else
            git checkout --orphan _pm2_prod_run
          fi

          # Remove all tracked files (clear the branch)
          git rm -rf . >/dev/null 2>&1 || true

          # Remove any remaining untracked files (keep .git)
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy fresh artifacts
          cp -r /tmp/renne-deploy/* .

          # Commit and force-push
          git add -A
          git commit -m "build: deploy ${SHORT_SHA} from main" --allow-empty
          git push --force origin _pm2_prod_run
